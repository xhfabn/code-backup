<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- 书本形状 -->
  <rect x="25" y="22" width="50" height="56" rx="2" fill="white" opacity="0.95"/>
  
  <!-- 书脊线 -->
  <line x1="50" y1="22" x2="50" y2="78" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 八股文字 "八" -->
  <g transform="translate(50, 45)">
    <!-- 上面的撇捺 -->
    <path d="M -8 -10 L -12 -5" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 8 -10 L 12 -5" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 中间的横线 -->
    <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 下面的撇捺 -->
    <path d="M -6 2 L -10 8" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 6 2 L 10 8" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- 底部装饰线条（代表文字） -->
  <line x1="30" y1="62" x2="70" y2="62" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="68" x2="65" y2="68" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="74" x2="68" y2="74" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- 右上角的印章效果 -->
  <circle cx="70" cy="32" r="8" fill="#2563eb"/>
  <text x="70" y="36" font-family="serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">通</text>
</svg>
